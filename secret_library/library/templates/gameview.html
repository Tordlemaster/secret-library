<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <title>{{ game.title }} | Secret Library</title>
    </head>
    <body>
        {% include 'account_header.html' %}
        <div class="game-view">
            <div class="game-view-column">
                <h1>{{ game.title }}</h1>
                <h2>{{ game.author }}, {{game.publication_year}}</h2>
                <p>
                    <a href="https://ifdb.org/viewgame?id={{ game.tuid }}">IFDB Page</a>
                </p>
                <p>
                    {{ game.description }}
                </p>
                <p>
                    <a href="/webplay/{{ game.tuid }}">Play in Browser (Parchment)</a>
                </p>
            </div>
            <img class="game-view-column"
                src="{{MEDIA_URL}}{{game.coverart_file.name}}"
                alt="{{game.title}} cover image"
            />
        </div>
    </body>
</html>
