<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <title>Scraper | Secret Library</title>
        <style>
            .success { color: green;}
            .error { color: red;}
        </style>
    </head>
    <body>
        {% include 'account_header.html' %}
        <div class="page-body">
            <p>
                <a href="{% url 'overview' %}">Back to overview</a>
            </p>
            <form action="{% url 'scraper' %}" method="post">
                {% csrf_token %}
                <label for="tuid">TUID: </label>
                <input id="tuid" type="text" name="tuid" value="">
                <input type="submit" value="OK">
            </form>
            {% for message in messages %}
                <p class="{{ message.tags }}">
                    {{ message }}
                </p>
            {% endfor %}
        </div>
    </body>
</html>
