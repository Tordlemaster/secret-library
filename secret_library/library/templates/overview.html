<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <title>Overview | Secret Library</title>
    </head>
    <body>
        <h1>Games Overview</h1>
        {% if game_list %}
            <ul>
                {% for game in game_list %}
                    <li><a href="/webplay/{{ game.tuid }}">{{ game.title }}</a></li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No games are available.</p>
        {% endif %}
    </body>
</html>
